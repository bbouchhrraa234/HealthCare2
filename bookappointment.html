<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Appointment</title>

<link rel="stylesheet" href="bookappointment.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo"><i class="fa fa-heartbeat"></i> HealthCare</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Services</a>
        <a href="#">About Us</a>
        <a href="#">Contact</a>
    </nav>

    <button class="login-btn">Login</button>
</header>

<!-- TITLE -->
<section class="top">
    <h1>Book Appointment</h1>
    <p>Easy & Fast Way to Get Your Appointment</p>
</section>

<!-- STEPS -->
<div class="steps">
    <div class="step active">1</div>
    <div class="line active"></div>
    <div class="step active">2</div>
    <div class="line"></div>
    <div class="step">3</div>
    <div class="line"></div>
    <div class="step">4</div>
</div>

<!-- LABELS -->
<div class="step-labels">
    <span>Doctor</span>
    <span>Date & Time</span>
    <span>Your Details</span>
    <span>Confirm</span>
</div>

<!-- MAIN -->
<section class="booking">

    <!-- DOCTOR -->
    <div class="box doctor">
        <img src="https://randomuser.me/api/portraits/men/75.jpg">
        <h3>Dr. Ahmed Ali</h3>
        <p>Cardiologist</p>
        <span>⭐⭐⭐⭐⭐ 4.8</span>
    </div>

    <!-- DATE -->
    <div class="box date">
        <h3>Select Date</h3>
        <input type="date">
    </div>

    <!-- TIME -->
    <div class="box time">
        <h3>Available Time Slots</h3>

        <div class="times">
            <button>09:00 AM</button>
            <button>10:00 AM</button>
            <button>11:00 AM</button>
            <button>01:00 PM</button>
            <button>02:00 PM</button>
            <button>03:00 PM</button>
        </div>
    </div>

</section>

<!-- BUTTONS -->
<div class="actions">
    <button class="back-btn">Back</button>
    <button class="next-btn">Next</button>
</div>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2025 HealthCare. All Rights Reserved.</p>

    <div class="socials">
        <i class="fab fa-facebook-f"></i>
        <i class="fab fa-twitter"></i>
        <i class="fab fa-linkedin-in"></i>
    </div>
</footer>

<script src="bookappointment.js"></script>
</body>
</html>
